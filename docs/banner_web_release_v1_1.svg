<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Encrypt and Decrypt Data Utility Tool web release 1.1 language support banner">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00565a"/>
      <stop offset="60%" stop-color="#008b8f"/>
      <stop offset="100%" stop-color="#006a6e"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="rgba(0,0,0,0.22)"/>
    </filter>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <circle cx="1180" cy="160" r="220" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  <circle cx="1180" cy="160" r="155" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <circle cx="1180" cy="160" r="90" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <circle cx="30" cy="300" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1.5"/>

  <!-- Left icon panel -->
  <rect x="60" y="78" width="162" height="162" rx="30" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" filter="url(#softShadow)"/>
  <rect x="94" y="130" width="94" height="78" rx="18" fill="rgba(255,255,255,0.92)"/>
  <path d="M117 127c0-22 15-38 38-38s38 16 38 38v16h-18v-16c0-12-8-20-20-20s-20 8-20 20v16h-18z" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="14" stroke-linecap="round"/>
  <circle cx="141" cy="169" r="10" fill="#006a6e"/>
  <rect x="136" y="176" width="10" height="18" rx="5" fill="#006a6e"/>

  <!-- Main title -->
  <text x="254" y="138" font-family="Georgia,'Times New Roman',serif" font-size="44" font-weight="bold" fill="white" opacity="0.97">Encrypt &amp; Decrypt</text>
  <text x="254" y="186" font-family="Georgia,'Times New Roman',serif" font-size="44" font-weight="bold" fill="white" opacity="0.97">Data Utility Tool</text>
  <line x1="254" y1="204" x2="1020" y2="204" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="254" y="228" font-family="'Courier New',monospace" font-size="14" fill="rgba(255,255,255,0.72)" letter-spacing="1.2">Web Release v1.1  ·  AES-256-GCM  ·  PBKDF2-SHA256  ·  Offline</text>

  <!-- Language status badges -->
  <rect x="254" y="250" width="110" height="34" rx="17" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
  <text x="309" y="272" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="white" text-anchor="middle">✓ English</text>

  <rect x="374" y="250" width="114" height="34" rx="17" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
  <text x="431" y="272" font-family="'Courier New',monospace" font-size="12" font-weight="bold" fill="white" text-anchor="middle">✓ Deutsch</text>

  <rect x="498" y="250" width="106" height="34" rx="17" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="551" y="272" font-family="'Courier New',monospace" font-size="12" fill="rgba(255,255,255,0.45)" text-anchor="middle">Français</text>

  <rect x="614" y="250" width="102" height="34" rx="17" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="665" y="272" font-family="'Courier New',monospace" font-size="12" fill="rgba(255,255,255,0.45)" text-anchor="middle">Español</text>

  <rect x="726" y="250" width="124" height="34" rx="17" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="788" y="272" font-family="'Courier New',monospace" font-size="12" fill="rgba(255,255,255,0.45)" text-anchor="middle">中文（简体）</text>

  <rect x="860" y="250" width="124" height="34" rx="17" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="922" y="272" font-family="'Courier New',monospace" font-size="12" fill="rgba(255,255,255,0.45)" text-anchor="middle">中文（繁體）</text>

  <rect x="994" y="250" width="82" height="34" rx="17" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="1035" y="272" font-family="'Courier New',monospace" font-size="12" fill="rgba(255,255,255,0.45)" text-anchor="middle">日本語</text>

  <!-- Corner tags -->
  <rect x="1060" y="14" width="204" height="30" rx="7" fill="rgba(0,0,0,0.28)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="1162" y="34" font-family="'Courier New',monospace" font-size="13" fill="rgba(255,255,255,0.85)" text-anchor="middle">GPL v3 · Open Source</text>
  <text x="1220" y="308" font-family="Georgia,serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="end">© Amanda Hernow · hernow.net</text>
</svg>
