  <rect x="1060" y="14" width="204" height="30" rx="7" fill="rgba(0,0,0,0.28)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="1162" y="34" font-family="'Courier New',monospace" font-size="13" fill="rgba(255,255,255,0.85)" text-anchor="middle">GPL v3 · Open Source</text>
  <text x="1220" y="308" font-family="Georgia,serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="end">© 2026 Amanda Hernow</text>
